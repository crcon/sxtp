<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>山西二次调频收益测算平台</title>
<link rel="stylesheet" href="css/style.css" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app">
  <!-- ============ 左侧导航 ============ -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">⚡</div>
      <div>
        <div class="brand-title">山西二次调频</div>
        <div class="brand-sub">收益测算平台</div>
      </div>
    </div>
    <nav class="nav">
      <div class="nav-group">
        <a class="nav-item active" data-view="overview"><span>🏠</span>首页总览</a>
      </div>
      <div class="nav-group">
        <div class="nav-title">收益测算</div>
        <a class="nav-item" data-view="params"><span>·</span>参数输入</a>
        <a class="nav-item" data-view="calc"><span>·</span>收益测算</a>
        <a class="nav-item" data-view="overview"><span>·</span>结果总览</a>
        <a class="nav-item" data-view="hourly"><span>·</span>小时收益明细</a>
        <a class="nav-item" data-view="daily"><span>·</span>日收益明细</a>
        <a class="nav-item" data-view="monthly"><span>·</span>月度收益分析</a>
      </div>
      <div class="nav-group">
        <div class="nav-title">运行分析</div>
        <a class="nav-item" data-view="mileage"><span>·</span>调频电量分析</a>
        <a class="nav-item" data-view="soc"><span>·</span>SOC运行分析</a>
        <a class="nav-item" data-view="performance"><span>·</span>性能指标分析</a>
      </div>
      <div class="nav-group">
        <div class="nav-title">财务分析</div>
        <a class="nav-item" data-view="cashflow"><span>·</span>现金流分析</a>
        <a class="nav-item" data-view="payback"><span>·</span>投资回收期</a>
        <a class="nav-item" data-view="sensitivity"><span>·</span>敏感性分析</a>
      </div>
      <div class="nav-group">
        <div class="nav-title">基础数据</div>
        <a class="nav-item" data-view="prices"><span>·</span>电价与补偿标准</a>
        <a class="nav-item" data-view="devices"><span>·</span>设备参数</a>
        <a class="nav-item" data-view="policy"><span>·</span>政策与方法</a>
      </div>
    </nav>
    <div class="nav-footer">
      <a class="nav-item" data-view="policy"><span>📖</span>使用说明</a>
    </div>
  </aside>

  <!-- ============ 主工作区 ============ -->
  <main class="main">
    <!-- 顶栏 -->
    <header class="topbar">
      <div>
        <h1 id="viewTitle">收益测算总览</h1>
        <div class="breadcrumb" id="viewSub">山西独立储能二次调频项目收益测算与分析</div>
      </div>
      <div class="top-actions">
        <button class="btn ghost">方案管理</button>
        <button class="btn ghost" id="btnExport">导出报告</button>
        <button class="btn ghost" id="btnTheme">🌓</button>
        <div class="user">山西能源科技 ▾</div>
      </div>
    </header>

    <!-- 工作区 + 右侧参数面板 -->
    <div class="work">
      <section class="content" id="content"></section>

      <!-- 右侧参数面板：始终显示 -->
      <aside class="panel">
        <div class="panel-title">
          <span>关键参数输入</span>
          <button class="btn-reset" id="btnReset" title="重置">↻ 重置</button>
        </div>

        <div class="panel-section">
          <div class="panel-sub">▾ 项目基本参数</div>
          <div class="field"><label>储能容量</label><div class="input-unit"><input id="p_energy" type="number" value="200"><span>MWh</span></div></div>
          <div class="field"><label>储能时长</label><div class="input-unit"><input id="p_duration" type="number" value="2"><span>h</span></div></div>
          <div class="field"><label>额定功率</label><div class="input-unit"><input id="p_power" type="number" value="100"><span>MW</span></div></div>
          <div class="field"><label>电池类型</label>
            <select id="p_battery">
              <option>磷酸铁锂</option><option>三元锂</option><option>钠离子</option>
            </select>
          </div>
          <div class="field"><label>项目地点</label>
            <select id="p_region"><option>山西省</option></select>
          </div>
        </div>

        <div class="panel-section">
          <div class="panel-sub">市场与收益参数</div>
          <div class="field"><label>里程价格</label><div class="input-unit"><input id="p_mileage_price" type="number" step="0.001" value="0.012"><span>元/kWh</span></div></div>
          <div class="field"><label>性能补偿上限</label><div class="input-unit"><input id="p_perf_max" type="number" step="0.001" value="0.015"><span>元/kWh</span></div></div>
          <div class="field"><label>容量补偿</label><div class="input-unit"><input id="p_cap_subsidy" type="number" value="12"><span>元/kW·月</span></div></div>
          <div class="field"><label>年调用次数</label><div class="input-unit"><input id="p_calls" type="number" value="365"><span>次/年</span></div></div>
          <div class="field"><label>日平均调频里程</label><div class="input-unit"><input id="p_mileage_mw" type="number" step="0.1" value="500"><span>MW(当量)</span></div></div>
          <div class="field"><label>综合性能系数K</label><div class="input-unit"><input id="p_k" type="number" step="0.01" value="1.80"><span></span></div></div>
        </div>

        <div class="panel-section">
          <div class="panel-sub">成本参数</div>
          <div class="field"><label>设备投资</label><div class="input-unit"><input id="p_capex_equip" type="number" step="0.01" value="0.90"><span>元/Wh</span></div></div>
          <div class="field"><label>EPC费用</label><div class="input-unit"><input id="p_capex_epc" type="number" step="0.01" value="0.20"><span>元/Wh</span></div></div>
          <div class="field"><label>年运维成本</label><div class="input-unit"><input id="p_opex" type="number" value="18"><span>元/kW·年</span></div></div>
          <div class="field"><label>充放电效率</label><div class="input-unit"><input id="p_eff" type="number" step="0.01" value="0.88"><span></span></div></div>
          <div class="field"><label>电芯衰减率</label><div class="input-unit"><input id="p_degrade" type="number" step="0.001" value="0.020"><span>/年</span></div></div>
        </div>

        <div class="panel-section">
          <div class="panel-sub">财务参数</div>
          <div class="field"><label>折现率</label><div class="input-unit"><input id="p_discount" type="number" step="0.01" value="8.00"><span>%</span></div></div>
          <div class="field"><label>增值税率</label><div class="input-unit"><input id="p_vat" type="number" value="13"><span>%</span></div></div>
          <div class="field"><label>所得税率</label><div class="input-unit"><input id="p_tax" type="number" value="25"><span>%</span></div></div>
          <div class="field"><label>项目周期</label><div class="input-unit"><input id="p_life" type="number" value="15"><span>年</span></div></div>
          <div class="field"><label>建设期</label><div class="input-unit"><input id="p_build" type="number" value="6"><span>月</span></div></div>
        </div>

        <button class="btn primary full" id="btnCalc">⟳ 重新计算</button>
      </aside>
    </div>
  </main>
</div>

<script src="js/data.js"></script>
<script src="js/calculator.js"></script>
<script src="js/views.js"></script>
<script src="js/charts.js"></script>
<script src="js/app.js"></script>
</body>
</html>
